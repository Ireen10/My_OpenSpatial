dataset:
  modality: image
  dataset_name: image_base
  data_dir: /home/ma-user/work/preliminary_grounding/z00848098/code/My_OpenSpatial/data_root/EmbodiedScan/preprocessed/arkitscenes/per_image/data-00000.parquet
  raw_data_root: /home/ma-user/work/preliminary_grounding/z00848098/code/My_OpenSpatial/data_root/EmbodiedScan/data/

pipeline:
  file_name: base_pipeline
  class_name: BasePipeline

  stages:
    filter_stage:
      -
        file_name: 3dbox_filter
        method: ThreeDBoxFilter
        proj_mask_threshold: 0.1
        box3d_pcd_threshold: 0.2
        box_scale_factor: 0.9
        mask_area_threshold: 0.005
        update_keys: []
        filter_tags: ["ceiling", "floor", "wall", "object"]
        output_dir:
        use_multi_processing: true
        num_workers: 40

    scene_fusion_stage:
      -
        file_name: depth_back_projection
        method: DepthBackProjecter
        depends_on: filter_stage/3dbox_filter
        output_dir:
        use_multi_processing: true
        num_workers: 40
