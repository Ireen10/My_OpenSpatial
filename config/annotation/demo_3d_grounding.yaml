dataset:
  modality: image
  dataset_name: image_base
  data_dir: E:/GitRepo/OpenSpatial/output/base_pipeline_demo_preprocessing_embodiedscan/scene_fusion_stage/depth_back_projection/data.parquet

pipeline:
  file_name: base_pipeline
  class_name: BasePipeline

  stages:
    annotation_stage:
      -
        file_name: 3d_grounding
        method: ThreeDGroundingGenerator
        scaling_factor: 1
        filter_tags: ["ceiling", "floor", "wall", "object"]
        sub_tasks:
          grounding_oe: 1
        use_multi_processing: false
        num_workers: 8
        output_dir:
