# Multiview: aggregate annotation outputs → merged parquet → upstream JSONL + tar.
#
# Prerequisite (same --output_dir as below):
#   python run.py --config config/annotation/demo_multiview_all.yaml --output_dir output/
#
# Usage:
#   python run.py --config config/aggregate/demo_aggregate_multiview.yaml --output_dir output/
#
# Outputs under {--output_dir}/base_pipeline_demo_aggregate_multiview/:
#   aggregate_stage/sample_aggregator/*.parquet
#   export_stage/jsonl/, images/, metadata.json

dataset:
  modality: image
  dataset_name: image_base
  data_dir: .

pipeline:
  file_name: base_pipeline
  class_name: BasePipeline

  stages:
    aggregate_stage:
      -
        file_name: sample_aggregator
        method: SampleAggregator
        input_tasks_prefix: ../base_pipeline_demo_multiview_all/annotation_stage
        input_tasks:
          - multiview_distance
          - multiview_size
          - multiview_correspondence
          - multiview_distance_obj_cam
          - multiview_object_position
        dedup_within_task: true
        merge_by_visual_input_group: true
        dedup_keep_policy: semantic_first
        output_dir:

    export_stage:
      -
        file_name: dataset_exporter
        method: DatasetExporter
        depends_on: aggregate_stage/sample_aggregator
        view_scope: multiview
        skip_parquet: true
        schema_version: "1.1"
        output_dir:
