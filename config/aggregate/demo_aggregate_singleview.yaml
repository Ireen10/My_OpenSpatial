# Singleview: aggregate annotation outputs → merged parquet → upstream JSONL + tar.
#
# Prerequisite (same --output_dir as below):
#   python run.py --config config/annotation/demo_singleview_all.yaml --output_dir output/
#
# Usage:
#   python run.py --config config/aggregate/demo_aggregate_singleview.yaml --output_dir output/
#
# Outputs under {--output_dir}/base_pipeline_demo_aggregate_singleview/:
#   aggregate_stage/sample_aggregator/*.parquet
#   export_stage/jsonl/, images/, metadata.json

dataset:
  modality: image
  dataset_name: image_base
  # Unused at init when input_tasks is set; kept for schema validation only.
  data_dir: .

pipeline:
  file_name: base_pipeline
  class_name: BasePipeline

  stages:
    aggregate_stage:
      -
        file_name: sample_aggregator
        method: SampleAggregator
        input_tasks_prefix: ../base_pipeline_demo_singleview_all/annotation_stage
        input_tasks:
          - distance
          - depth_annotation
          - size
          - position
          - 3d_grounding
        # Dedup is handled during annotation sampling; aggregate only merges turns.
        dedup_within_task: false
        merge_by_visual_input_group: true
        output_dir:

    export_stage:
      -
        file_name: dataset_exporter
        method: DatasetExporter
        depends_on: aggregate_stage/sample_aggregator
        view_scope: singleview
        skip_parquet: true
        schema_version: "1.1"
        use_multi_processing: true
        num_workers: 8
        shard_size: 8192
        output_dir:
