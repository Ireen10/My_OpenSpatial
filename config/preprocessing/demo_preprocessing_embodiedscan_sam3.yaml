dataset:
  modality: image
  dataset_name: image_base
  # Parquet from embodiedscan_data export (per_image shards or single file).
  data_dir: /home/ma-user/work/preliminary_grounding/z00848098/code/My_OpenSpatial/data_root/EmbodiedScan/preprocessed/scannet/per_image/
  # Root of raw RGB/depth assets; joined with relative paths in parquet (EmbodiedScan data/).
  raw_data_root: /home/ma-user/work/preliminary_grounding/z00848098/code/My_OpenSpatial/data_root/EmbodiedScan/data/

pipeline:
  file_name: base_pipeline
  class_name: BasePipeline

  stages:

    filter_stage:
      -
        file_name: 3dbox_filter
        method: ThreeDBoxFilter
        proj_mask_threshold: 0.1
        box3d_pcd_threshold: 0.1
        box_scale_factor: 0.9
        mask_area_threshold: 0.005
        update_keys: []
        filter_tags: ["ceiling", "floor", "wall", "object"]
        output_dir:
        use_multi_processing: true
        num_workers: 96              # CPU-bound (cv2/open3d/numpy release GIL)

    localization_stage:
      -
        file_name: sam3_refiner
        method: Sam3Refiner
        update_keys: ["obj_tags", "bboxes_3d_world_coords"]
        depends_on: filter_stage/3dbox_filter
        output_dir:

        segmenter_model: /home/ma-user/work/preliminary_grounding/z00848098/code/My_OpenSpatial/data_root/model_weights/sam3/

        # Quality gates (same as Sam2Refiner): confidence + minimum mask area.
        score_threshold: 0.25
        min_mask_pixels: 20

        device: "npu:0,npu:1,npu:2,npu:3"
        replicas_per_device: 1
        use_multi_processing: true
        num_workers: 4
        batch_size: 16                # pipeline images per _refine() call
        prompt_batch_size: 32        # flattened (image, tag, box) rows per SAM3 forward

    scene_fusion_stage:
      -
        file_name: depth_back_projection
        method: DepthBackProjecter
        depends_on: localization_stage/sam3_refiner
        output_dir:
        use_multi_processing: true
        num_workers: 64              # CPU-bound (numpy/open3d release GIL)

    # Per-scene multiview input (347 per-image rows → N scenes by scene_id).
    # Output: group_stage/group/data.parquet — point demo_multiview_all_frame_rot.yaml data_dir here.
    group_stage:
      -
        file_name: group
        method: SampleGrouper
        group_by: scene_id
        group_col_list:
          - image
          - id
          - obj_tags
          - depth_map
          - pose
          - intrinsic
          - bboxes_3d_world_coords
          - masks
          - bboxes_2d
          - pointclouds
          - depth_scale
          - axis_align_matrix
        depends_on: scene_fusion_stage/depth_back_projection
        output_dir:
