dataset:
  modality: image
  dataset_name: image_base
  # Parquet from embodiedscan_data export (per_image shards or single file).
  data_dir: E:/GitRepo/OpenSpatial/data_root/EmbodiedScan/preprocess_output_lowres/per_image/data-00000.parquet
  # Root of raw RGB/depth assets; joined with relative paths in parquet (EmbodiedScan data/).
  raw_data_root: E:/GitRepo/OpenSpatial/data_root/EmbodiedScan/data

pipeline:
  file_name: base_pipeline
  class_name: BasePipeline

  stages:

    filter_stage:
      -
        file_name: 3dbox_filter
        method: ThreeDBoxFilter
        proj_mask_threshold: 0.1
        box3d_pcd_threshold: 0.1
        box_scale_factor: 0.9
        mask_area_threshold: 0.005
        update_keys: []
        filter_tags: ["ceiling", "floor", "wall", "object"]
        output_dir:

    localization_stage:
      -
        file_name: sam2_refiner
        method: Sam2Refiner
        update_keys: ["obj_tags", "bboxes_3d_world_coords"]
        depends_on: filter_stage/3dbox_filter
        output_dir:

    scene_fusion_stage:
      -
        file_name: depth_back_projection
        method: DepthBackProjecter
        depends_on: localization_stage/sam2_refiner
        output_dir:
