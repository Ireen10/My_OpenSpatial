# M7 (composed): image_base load + jsonl_base upstream bundle (same artifact as DatasetExporter).
#
# Usage:
#   python run.py --config config/export/demo_export_composed_frame_rot.yaml --output_dir E:/GitRepo/OpenSpatial/output/frame_rot

dataset:
  modality: image
  input_dataset_name: image_base
  output_dataset_name: jsonl_base
  data_dir: E:/GitRepo/OpenSpatial/output/frame_rot/base_pipeline_demo_aggregate_singleview_frame_rot/aggregate_stage/merged_samples/data.parquet
  export_bundle: true
  export_dir: export
  schema_version: "1.1"

pipeline:
  file_name: base_pipeline
  class_name: BasePipeline
  output_dir: E:/GitRepo/OpenSpatial/output/frame_rot/base_pipeline_demo_export_composed_frame_rot

  stages:
    export_stage:
      -
        file_name: dataset_exporter
        method: PassThroughExportTask
        depends_on: ../base_pipeline_demo_aggregate_singleview_frame_rot/aggregate_stage/merged_samples
        output_dir: upstream_singleview
