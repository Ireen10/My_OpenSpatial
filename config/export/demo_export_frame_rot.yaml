# M7: Upstream JSONL + tar from merged aggregate (singleview + multiview, same exporter).
#
# Prerequisites:
#   python run.py --config config/aggregate/demo_aggregate_singleview_frame_rot.yaml --output_dir E:/GitRepo/OpenSpatial/output/frame_rot
#   python run.py --config config/aggregate/demo_aggregate_multiview_frame_rot.yaml --output_dir E:/GitRepo/OpenSpatial/output/frame_rot
#
# Usage:
#   python run.py --config config/export/demo_export_frame_rot.yaml --output_dir E:/GitRepo/OpenSpatial/output/frame_rot

dataset:
  modality: image
  dataset_name: image_base
  data_dir: E:/GitRepo/OpenSpatial/output/frame_rot/base_pipeline_demo_aggregate_singleview_frame_rot/aggregate_stage/merged_samples/data.parquet

pipeline:
  file_name: base_pipeline
  class_name: BasePipeline
  output_dir: E:/GitRepo/OpenSpatial/output/frame_rot/base_pipeline_demo_export_frame_rot

  stages:
    export_stage:
      -
        file_name: dataset_exporter
        method: DatasetExporter
        depends_on: ../base_pipeline_demo_aggregate_singleview_frame_rot/aggregate_stage/merged_samples
        output_dir: singleview
        view_scope: singleview
        skip_parquet: true
        schema_version: "1.1"
      -
        file_name: dataset_exporter
        method: DatasetExporter
        depends_on: ../base_pipeline_demo_aggregate_multiview_frame_rot/aggregate_stage/merged_samples
        output_dir: multiview
        view_scope: multiview
        skip_parquet: true
        schema_version: "1.1"
